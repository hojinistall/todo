<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Todo</h1>
      <p class="subtitle">오늘 할 일을 정리하세요</p>
    </header>

    <form id="todo-form" class="input-section">
      <input
        type="text"
        id="todo-input"
        placeholder="할 일을 입력하세요..."
        autocomplete="off"
        maxlength="200"
      >
      <button type="submit" id="add-btn">추가</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행중</button>
      <button class="filter-btn" data-filter="completed">완료</button>
    </div>

    <ul id="todo-list"></ul>

    <footer id="footer" class="footer" style="display:none;">
      <span id="count"></span>
      <button id="clear-completed" style="display:none;">완료 항목 삭제</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
